<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Al Madina Food Store — Digital Menu Board">
  <title>Al Madina Food Store — Digital Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="lights" aria-hidden="true">
    <div class="lights-wire"></div>
    <div class="lights-bulbs">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="animal-silhouette" id="animalSilhouette" aria-hidden="true"></div>

  <div class="corner-photos" id="cornerPhotos" aria-hidden="true"></div>

  <div class="slideshow-bg" id="slideshowBg" aria-hidden="true"></div>
  <div class="wood-overlay" aria-hidden="true"></div>

  <div class="app" id="app">

    <header class="header">
      <div class="open-hours-badge">
        <span class="badge-label">Open Hours</span>
        <span class="badge-value" id="openHours">8AM - 10PM</span>
      </div>

      <div class="header-center">
        <p class="store-name" id="storeName">AL MADINA FOOD STORE</p>
        <h1 class="main-title" id="mainTitle">CHICKEN</h1>
        <p class="list-price" id="pageSubtitle">List PRICE!</p>
      </div>

      <div class="header-right">
        <div class="halal-badge">
          <span class="halal-ar">حلال</span>
          <span class="halal-en">Halal</span>
        </div>
        <div class="weather-widget hidden" id="weatherWidget">
          <span class="weather-temp" id="weatherTemp">--°</span>
          <span class="weather-desc" id="weatherDesc">--</span>
        </div>
      </div>
    </header>

    <div class="promo-banner hidden" id="promoBanner">
      <p id="promoBannerText"></p>
    </div>

    <main class="menu-section">
      <div class="menu-grid" id="menuGrid" role="list" aria-label="Menu prices"></div>
      <nav class="page-nav" id="pageNav" aria-label="Menu pages">
        <a href="#chicken" class="nav-item" data-page="chicken">Chicken</a>
        <a href="#lamb" class="nav-item" data-page="lamb">Lamb</a>
        <a href="#beef" class="nav-item" data-page="beef">Beef</a>
      </nav>
      <div class="status-indicator" id="statusIndicator" aria-live="polite">
        <span class="status-dot"></span>
        <span class="status-text">Loading menu…</span>
      </div>
    </main>

    <section class="extras-row">
      <div class="quality-seal">
        <span class="seal-star">★</span>
        <span class="seal-text">HQ<br>Highest Quality</span>
      </div>
      <div class="offer-card hidden" id="offerCard">
        <p class="offer-label">Today's Offer</p>
        <p class="offer-product" id="offerProduct">—</p>
        <p class="offer-price" id="offerPrice">—</p>
        <p class="offer-note" id="offerNote"></p>
      </div>
      <div class="qr-card hidden" id="qrCard">
        <img src="" alt="WhatsApp order QR code" class="qr-image" id="qrImage">
        <p class="qr-label">Order via WhatsApp</p>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-left">
        <span class="footer-badge">Highest Quality</span>
        <span class="footer-divider">|</span>
        <span class="footer-badge">Halal Certified</span>
      </div>
      <div class="footer-center">
        <span class="footer-date" id="footerDate">—</span>
      </div>
      <div class="footer-right">
        <span class="footer-clock" id="footerClock">00:00:00</span>
        <button class="fullscreen-btn" id="fullscreenBtn" title="Toggle fullscreen" aria-label="Toggle fullscreen">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
