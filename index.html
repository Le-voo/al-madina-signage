<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Al Madina Food Store — Digital Menu Board">
  <title>Al Madina Food Store — Chicken Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Decorative string lights -->
  <div class="lights" aria-hidden="true">
    <div class="lights-wire"></div>
    <div class="lights-bulbs">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- Chicken silhouette decoration -->
  <div class="chicken-silhouette" aria-hidden="true">
    <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
      <path d="M120 30 C140 10 170 20 175 45 C180 65 165 80 150 85 L155 100 C160 115 150 130 135 135 L130 150 C125 158 110 160 100 155 L85 150 C70 145 60 130 65 115 L70 100 C55 95 40 80 45 60 C50 35 80 25 100 35 C105 32 112 30 120 30 Z" fill="currentColor"/>
      <circle cx="155" cy="50" r="6" fill="currentColor" opacity="0.3"/>
      <path d="M75 55 C65 50 55 55 50 65 C45 75 50 85 60 88" fill="none" stroke="currentColor" stroke-width="3" opacity="0.4"/>
    </svg>
  </div>

  <div class="slideshow-bg" id="slideshowBg" aria-hidden="true"></div>
  <div class="wood-overlay" aria-hidden="true"></div>

  <div class="app" id="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <img src="assets/logo.png" alt="Store Logo" class="logo" id="storeLogo">
        <div class="store-info">
          <p class="store-name" id="storeName">AL MADINA FOOD STORE</p>
          <h1 class="main-title" id="mainTitle">CHICKEN</h1>
          <p class="subtitle" id="subtitle">Fresh • Quality • Halal</p>
        </div>
      </div>
      <div class="header-right">
        <div class="halal-badge">
          <span class="halal-icon">☪</span>
          <span>HALAL<br>CERTIFIED</span>
        </div>
        <div class="weather-widget hidden" id="weatherWidget">
          <span class="weather-temp" id="weatherTemp">--°</span>
          <span class="weather-desc" id="weatherDesc">--</span>
        </div>
      </div>
    </header>

    <!-- Promotional Banner -->
    <div class="promo-banner hidden" id="promoBanner">
      <p id="promoBannerText"></p>
    </div>

    <!-- Main Menu Grid -->
    <main class="menu-section">
      <div class="menu-grid" id="menuGrid" role="list" aria-label="Chicken menu prices">
        <!-- Cards injected by script.js -->
      </div>
      <div class="status-indicator" id="statusIndicator" aria-live="polite">
        <span class="status-dot"></span>
        <span class="status-text">Loading menu…</span>
      </div>
    </main>

    <!-- Today's Offer + QR -->
    <section class="extras-row">
      <div class="offer-card hidden" id="offerCard">
        <p class="offer-label">Today's Offer</p>
        <p class="offer-product" id="offerProduct">—</p>
        <p class="offer-price" id="offerPrice">—</p>
        <p class="offer-note" id="offerNote"></p>
      </div>
      <div class="qr-card hidden" id="qrCard">
        <img src="" alt="WhatsApp order QR code" class="qr-image" id="qrImage">
        <p class="qr-label">Order via WhatsApp</p>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-left">
        <span class="footer-badge">Highest Quality</span>
        <span class="footer-divider">|</span>
        <span class="footer-badge">Halal Certified</span>
      </div>
      <div class="footer-center">
        <span class="footer-date" id="footerDate">—</span>
      </div>
      <div class="footer-right">
        <span class="footer-clock" id="footerClock">00:00:00</span>
        <button class="fullscreen-btn" id="fullscreenBtn" title="Toggle fullscreen" aria-label="Toggle fullscreen">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
